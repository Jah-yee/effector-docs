name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [docs-content-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # When docs repo notifies us, pull latest effectorHQ/docs into submodule so the
      # site matches canonical docs without a manual submodule bump in this repo.
      - name: Sync docs-content to latest docs main
        if: github.event_name == 'repository_dispatch'
        run: |
          git submodule update --init docs-content
          cd docs-content
          git fetch origin main
          git checkout -B main FETCH_HEAD
          cd ..

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: node build.js
      - run: npm test

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
